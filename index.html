<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Movie YouTube Search</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #141e30, #243b55, #0f2027, #2c5364);
  background-size: 400% 400%;
  animation: bgMove 10s infinite alternate;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

@keyframes bgMove {
  0% {background-position: left;}
  100% {background-position: right;}
}

.box {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  outline: none;
}

.result {
  margin-top: 20px;
}

.btn {
  margin-top: 15px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: red;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: darkred;
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="box">
  <h2>🎬 Movie → YouTube</h2>
  <input type="text" id="search" placeholder="اكتب اسم فيلم واضغط Enter">
  
  <div class="result" id="result"></div>
</div>

<script>
const input = document.getElementById("search");
const result = document.getElementById("result");

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const query = input.value.trim();
    if (!query) return;

    // رابط البحث في يوتيوب
    const youtubeURL = `https://www.youtube.com/results?search_query=${encodeURIComponent(query + " trailer")}`;

    result.innerHTML = `
      <p>🎬 ${query}</p>
      <button class="btn" onclick="goToYoutube()">▶ مشاهدة في YouTube</button>
    `;

    // نخزن الرابط
    window.currentURL = youtubeURL;
  }
});

// function تمشي لليوتيوب
function goToYoutube() {
  window.open(window.currentURL, "_blank");
}
</script>

</body>
</html>
